<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla de Goleadores - FIFA World Cup 2026</title>
  <link rel="stylesheet" href="./styles/styles.css">
  <style>
    /* Estilos Premium para la Tabla de Goleadores */
    .stats-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .stats-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-accent);
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.5rem;
    }

    .scorers-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
    }

    .scorers-table th,
    .scorers-table td {
      padding: 0.8rem 1rem;
      text-align: left;
    }

    .scorers-table th {
      color: var(--color-text-muted);
      border-bottom: 2px solid var(--color-border);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    .scorers-table td {
      font-size: 0.9rem;
      border-bottom: 1px solid var(--color-surface-light);
    }

    .scorers-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .rank-cell {
      font-weight: 700;
      color: var(--color-accent);
      width: 60px;
      text-align: center !important;
    }

    .goals-cell {
      font-weight: 700;
      color: var(--color-success);
      width: 100px;
      text-align: center !important;
    }

    .scorers-table th.center-align,
    .scorers-table td.center-align {
      text-align: center;
    }

    /* Medallas para los Top 3 */
    .medal {
      display: inline-block;
      width: 24px;
      height: 24px;
      line-height: 24px;
      border-radius: 50%;
      text-align: center;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .medal-1 {
      background: #ffd700;
      color: #000;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
    }

    .medal-2 {
      background: #c0c0c0;
      color: #000;
      box-shadow: 0 0 8px rgba(192, 192, 192, 0.4);
    }

    .medal-3 {
      background: #cd7f32;
      color: #000;
      box-shadow: 0 0 8px rgba(205, 127, 50, 0.4);
    }

    .grid-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    @media (min-width: 800px) {
      .grid-layout {
        grid-template-columns: 2fr 1fr;
      }
    }

    .stat-badge {
      background: var(--color-surface-light);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.4rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-accent);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>FIFA World Cup <span>2026</span></h1>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="fixture.html">Fixture</a></li>
        <li><a href="tops.html" class="active">Goleadores</a></li>
        <li><a href="elimination-bracket.html">Llaves</a></li>
        <li><a href="login.html" id="nav-login">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="grid-layout">
      <!-- Tabla Principal de Goleadores -->
      <div class="stats-card">
        <div class="stats-title">Tabla de Goleadores (Top 15)</div>
        <table class="scorers-table" id="scorers-table">
          <thead>
            <tr>
              <th class="center-align">Pos</th>
              <th>Jugador</th>
              <th class="center-align">Goles</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="3" style="text-align: center; color: var(--color-text-muted);">
                Cargando goleadores...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Resumen Estadístico de Goles -->
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div class="stats-card">
          <div class="stats-title">Resumen de Goles</div>
          <div style="display: flex; flex-direction: column; gap: 1rem;" id="goals-summary-container">
            <p style="color: var(--color-text-muted);">Cargando estadísticas...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import GoalsController from '../controllers/GoalsController.js';

    const goalsController = new GoalsController();

    document.addEventListener('DOMContentLoaded', async () => {
      await goalsController.init();
      renderTopScorers();
      renderStatsSummary();
    });

    function renderTopScorers() {
      const tableBody = document.querySelector('#scorers-table tbody');
      if (!tableBody) return;

      const scorers = goalsController.getTopScorers(15);
      
      if (scorers.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="3" style="text-align: center; color: var(--color-text-muted);">
              Aún no se han registrado goles en el torneo.
            </td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = scorers.map((s, index) => {
        const rank = index + 1;
        let rankHTML = rank;
        
        if (rank === 1) rankHTML = '<span class="medal medal-1">1</span>';
        else if (rank === 2) rankHTML = '<span class="medal medal-2">2</span>';
        else if (rank === 3) rankHTML = '<span class="medal medal-3">3</span>';

        return `
          <tr>
            <td class="rank-cell center-align">${rankHTML}</td>
            <td style="font-weight: 600; color: var(--color-text);">${s.player}</td>
            <td class="goals-cell center-align">${s.goals}</td>
          </tr>
        `;
      }).join('');
    }

    function renderStatsSummary() {
      const container = document.getElementById('goals-summary-container');
      if (!container) return;

      const summary = goalsController.getTournamentGoalStats();

      container.innerHTML = `
        <div class="stat-badge">
          <span class="stat-value">${summary.totalGoals}</span>
          <span class="stat-label">Goles Totales</span>
        </div>
        <div class="stat-badge">
          <span class="stat-value">${summary.averageGoalsPerMatch}</span>
          <span class="stat-label">Promedio de Goles por Partido</span>
        </div>
        <div class="stat-badge">
          <span class="stat-value">${summary.uniqueScorers}</span>
          <span class="stat-label">Goleadores Únicos</span>
        </div>
        <div class="stat-badge">
          <span class="stat-value">${summary.maxGoalsInMatch}</span>
          <span class="stat-label">Máximo de Goles en un Partido</span>
        </div>
      `;
    }
  </script>
</body>
</html>
