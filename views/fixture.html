<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixture de Partidos y Posiciones - FIFA World Cup 2026</title>
  <link rel="stylesheet" href="./styles/styles.css">
  <style>
    /* Estilos Premium para el Fixture de Grupos */
    .groups-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      margin-top: 1.5rem;
    }
    
    @media (min-width: 900px) {
      .groups-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .group-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .group-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 0.5rem;
    }

    .group-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-accent);
    }

    /* Tabla de posiciones */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .standings-table th, 
    .standings-table td {
      padding: 0.5rem 0.3rem;
      text-align: center;
    }

    .standings-table th {
      color: var(--color-text-muted);
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
    }

    .standings-table td.team-cell {
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .standings-table tr:not(:last-child) td {
      border-bottom: 1px solid var(--color-surface-light);
    }

    .flag-icon {
      width: 20px;
      height: 13px;
      object-fit: cover;
      border-radius: 1px;
    }

    .qualify-zone {
      background: rgba(34, 197, 94, 0.05);
    }

    .qualify-zone td:first-child {
      border-left: 3px solid var(--color-success);
    }

    /* Partidos del grupo */
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .match-row {
      background: var(--color-surface-light);
      border-radius: 4px;
      padding: 0.5rem 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .match-row:hover {
      border-color: var(--color-accent);
      background: var(--color-surface);
    }

    .match-teams-flow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-grow: 1;
    }

    .match-team {
      width: 38%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .match-team.home-t {
      text-align: right;
    }

    .match-team.away-t {
      text-align: left;
    }

    .match-score-flow {
      font-weight: 700;
      font-size: 0.9rem;
      background: var(--color-bg);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      min-width: 45px;
      text-align: center;
      color: var(--color-accent);
    }

    .match-date-meta {
      font-size: 0.65rem;
      color: var(--color-text-muted);
      text-align: right;
      min-width: 70px;
    }

    /* Filtros y Controles */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-btn-group {
      display: flex;
      gap: 0.5rem;
    }

    .btn-filter {
      background: var(--color-surface-light);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-filter:hover, 
    .btn-filter.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      width: 90%;
      max-width: 480px;
      padding: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      transform: translateY(20px);
      transition: transform 0.3s;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 1.1rem;
      color: var(--color-accent);
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.4rem;
      font-weight: 700;
    }

    .modal-teams-edit {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .edit-team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .edit-team-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-weight: 600;
    }

    .score-input {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      width: 60px;
      padding: 0.5rem;
      border-radius: 4px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .score-input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .player-select-container {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-bottom: 0.4rem;
    }

    .form-input-text {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      padding: 0.6rem;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }

    .btn-action {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
    }

    .btn-cancel:hover {
      background: var(--color-surface-light);
      color: var(--color-text);
    }

    .btn-save {
      background: var(--color-primary);
      border: 1px solid var(--color-primary);
      color: #fff;
    }

    .btn-save:hover {
      background: var(--color-primary-dark);
    }
  </style>
</head>
<body>
  <header>
    <h1>FIFA World Cup <span>2026</span></h1>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="fixture.html" class="active">Fixture</a></li>
        <li><a href="tops.html">Goleadores</a></li>
        <li><a href="elimination-bracket.html">Eliminatorias</a></li>
        <li><a href="login.html" id="nav-login">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="controls-panel">
      <div>
        <h2>Fixture de la Fase de Grupos</h2>
        <p style="color: var(--color-text-muted); font-size: 0.85rem; margin-top: 0.2rem;">
          Resultados oficiales de los 12 grupos. Haz clic en un partido para editarlo y actualizar la tabla.
        </p>
      </div>
      <div class="filter-btn-group">
        <button class="btn-filter active" id="btn-show-all">Todos los Grupos</button>
        <select class="btn-filter" id="select-group-filter" style="outline: none;">
          <option value="">Filtrar por Letra...</option>
          <option value="A">Grupo A</option>
          <option value="B">Grupo B</option>
          <option value="C">Grupo C</option>
          <option value="D">Grupo D</option>
          <option value="E">Grupo E</option>
          <option value="F">Grupo F</option>
          <option value="G">Grupo G</option>
          <option value="H">Grupo H</option>
          <option value="I">Grupo I</option>
          <option value="J">Grupo J</option>
          <option value="K">Grupo K</option>
          <option value="L">Grupo L</option>
        </select>
      </div>
    </div>

    <!-- Contenedor Principal de Grupos -->
    <div class="groups-grid" id="groups-container">
      <p>Cargando fixture y grupos...</p>
    </div>
  </main>

  <!-- Modal de Edición de Partido de Grupo -->
  <div class="modal-overlay" id="edit-match-modal">
    <div class="modal-card">
      <div class="modal-title" id="modal-match-title">Registrar Resultado</div>
      <form id="edit-match-form">
        <input type="hidden" id="modal-match-id">
        
        <div class="modal-teams-edit">
          <!-- Local -->
          <div class="edit-team-row">
            <div class="edit-team-info">
              <img id="modal-home-flag" class="flag-icon" src="" alt="">
              <span id="modal-home-name">Local</span>
            </div>
            <input type="number" id="modal-home-score" class="score-input" min="0" required>
          </div>

          <!-- Visitante -->
          <div class="edit-team-row">
            <div class="edit-team-info">
              <img id="modal-away-flag" class="flag-icon" src="" alt="">
              <span id="modal-away-name">Visitante</span>
            </div>
            <input type="number" id="modal-away-score" class="score-input" min="0" required>
          </div>
        </div>

        <!-- Goleadores -->
        <div class="form-group">
          <label for="modal-home-scorers">Goleadores Local</label>
          <div class="player-select-container">
            <select id="home-players-select" class="form-input-text">
              <option value="">Agregar jugador...</option>
            </select>
          </div>
          <input type="text" id="modal-home-scorers" class="form-input-text" placeholder="Ej. L. Messi 12'">
        </div>

        <div class="form-group">
          <label for="modal-away-scorers">Goleadores Visitante</label>
          <div class="player-select-container">
            <select id="away-players-select" class="form-input-text">
              <option value="">Agregar jugador...</option>
            </select>
          </div>
          <input type="text" id="modal-away-scorers" class="form-input-text" placeholder="Ej. K. Mbappé 88'">
        </div>

        <!-- Asistidores -->
        <!-- Asistidores -->
        <div class="form-group">
          <label for="modal-home-assists">Asistidores Local</label>
          <div class="player-select-container">
            <select id="home-assists-select" class="form-input-text">
              <option value="">Agregar jugador...</option>
            </select>
          </div>
          <input type="text" id="modal-home-assists" class="form-input-text" placeholder="Ej. L. Messi">
        </div>

        <div class="form-group">
          <label for="modal-away-assists">Asistidores Visitante</label>
          <div class="player-select-container">
            <select id="away-assists-select" class="form-input-text">
              <option value="">Agregar jugador...</option>
            </select>
          </div>
          <input type="text" id="modal-away-assists" class="form-input-text" placeholder="Ej. A. Di María">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-action btn-cancel" id="btn-close-modal">Cancelar</button>
          <button type="submit" class="btn-action btn-save">Guardar Resultado</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./js/fixture.js"></script>
</body>
</html>
