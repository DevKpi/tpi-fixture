<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - FIFA World Cup 2026</title>
  <link rel="stylesheet" href="./styles/styles.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .logo-glow {
      color: var(--color-accent);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
    }

    .logo-glow span {
      color: #fff;
    }

    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 0.5rem;
    }

    .input-field {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: #fff;
      padding: 0.75rem;
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--color-accent);
    }

    .btn-login {
      width: 100%;
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 0.75rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: var(--color-primary-dark);
    }

    .user-info-text {
      color: var(--color-text-muted);
      font-size: 0.85rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>FIFA World Cup <span>2026</span></h1>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="fixture.html">Fixture</a></li>
        <li><a href="tops.html">Goleadores</a></li>
        <li><a href="elimination-bracket.html">Eliminatorias</a></li>
        <li><a href="login.html" id="nav-login" class="active">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="login-container">
      <div class="login-card">
        <div class="logo-glow">FIFA <span>2026</span></div>
        <h2 style="margin-bottom: 0.5rem; font-size: 1.25rem;">Panel del Fixture</h2>
        <p style="color: var(--color-text-muted); font-size: 0.85rem; margin-bottom: 2rem;">
          Ingresa tu nombre para guardar tus predicciones del torneo.
        </p>

        <form id="login-form">
          <div class="form-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" class="input-field" placeholder="Ingresa tu nombre..." required>
          </div>
          <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <div id="logged-user-status" class="user-info-text" style="display: none;">
          Actualmente ingresado como: <strong id="logged-username" style="color: var(--color-accent);"></strong>
          <br>
          <a href="#" id="btn-logout" style="color: var(--color-danger); display: inline-block; margin-top: 0.5rem;">Cerrar Sesión</a>
          
          <div style="margin-top: 2rem; margin-bottom: 2rem; background: var(--color-bg); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--color-border);">
            <p style="margin-bottom: 1rem; color: var(--color-text); font-weight: 600; font-size: 1.1rem; text-align: center;">🏆 Tu Progreso en el Torneo</p>
            <div style="width: 100%; background: var(--color-surface); border-radius: 10px; overflow: hidden; height: 24px; border: 1px solid var(--color-border);">
              <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--color-accent), #3b82f6); transition: width 1s ease-out;"></div>
            </div>
            <p id="progress-text" style="font-size: 0.95rem; color: var(--color-text-muted); margin-top: 0.8rem; text-align: center;">Calculando progreso...</p>
          </div>

          <button id="btn-reset-results" class="btn-login" style="background: var(--color-danger); margin-top: 1rem;">Limpiar Resultados y Reiniciar Eliminatorias</button>
          <button id="btn-reset-tournament" class="btn-login" style="background: var(--color-danger); margin-top: 1rem;">Sincronizar datos fixture</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import APIService from '../services/apiService.js';
    import Usuario from '../models/User.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      const currentUser = Usuario.ObtenerUsuarioActual();
      const loginForm = document.getElementById('login-form');
      const statusDiv = document.getElementById('logged-user-status');
      const usernameSpan = document.getElementById('logged-username');
      const logoutBtn = document.getElementById('btn-logout');
      const resetResultsBtn = document.getElementById('btn-reset-results');

      if (currentUser) {
        loginForm.style.display = 'none';
        statusDiv.style.display = 'block';
        usernameSpan.textContent = currentUser.id;

        APIService.getAllMatches().then(matches => {
          const stats = currentUser.AnotarResultados(matches);
          
          document.getElementById('progress-bar').style.width = stats.percentage + '%';
          document.getElementById('progress-text').textContent = `Has completado ${stats.finishedMatches} de ${stats.totalMatches} partidos (${stats.percentage}%)`;
        }).catch(err => {
          console.error("Error al cargar progreso:", err);
          document.getElementById('progress-text').textContent = "Error al cargar progreso.";
        });
      }

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        if (Usuario.LogIn(username)) {
          alert(`¡Bienvenido, ${username}! Tus cambios y predicciones ahora se guardarán.`);
          window.location.href = '../index.html';
        }
      });

      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        Usuario.LogOut();
        alert('Sesión cerrada.');
        window.location.reload();
      });

      if (resetResultsBtn) {
        resetResultsBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          if (confirm('¿Estás seguro de que quieres limpiar todos los resultados y reiniciar el torneo? Esto borrará todos los goles y equipos de las rondas eliminatorias.')) {
            await APIService.clearAllResults();
          }
        });
      }

      const resetTournamentBtn = document.getElementById('btn-reset-tournament');
      if (resetTournamentBtn) {
        resetTournamentBtn.addEventListener('click', () => {
          if (confirm('¿Estás seguro de que quieres restablecer todo el fixture a su estado original? Perderás todos los resultados cargados.')) {
            APIService.resetTournament();
          }
        });
      }
    });
  </script>
</body>
</html>
