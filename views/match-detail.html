<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Partido - FIFA World Cup 2026</title>
  <link rel="stylesheet" href="./styles/styles.css">
  <style>
    .detail-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 2.5rem;
      max-width: 600px;
      margin: 2rem auto;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .detail-header {
      font-size: 0.8rem;
      color: var(--color-accent);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }

    .teams-vs-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2rem 0;
      gap: 1.5rem;
    }

    .team-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .team-flag-large {
      width: 80px;
      height: 53px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 2px solid var(--color-border);
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .team-name-large {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .score-display-large {
      font-size: 3rem;
      font-weight: 800;
      color: var(--color-accent);
      padding: 0 1.5rem;
      min-width: 100px;
      text-align: center;
    }

    .meta-list {
      text-align: left;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      font-size: 0.9rem;
    }

    .meta-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--color-surface-light);
      padding-bottom: 0.4rem;
    }

    .meta-item:last-child {
      border: none;
      padding-bottom: 0;
    }

    .meta-label {
      color: var(--color-text-muted);
      font-weight: 600;
    }

    .meta-value {
      color: var(--color-text);
      font-weight: 700;
    }

    .scorers-container {
      margin-top: 1.5rem;
      text-align: left;
      font-size: 0.85rem;
    }

    .scorers-title {
      font-weight: 700;
      color: var(--color-accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.2rem;
    }

    .btn-back {
      background: var(--color-surface-light);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      display: inline-block;
      margin-top: 1.5rem;
      transition: all 0.2s;
    }

    .btn-back:hover {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>FIFA World Cup <span>2026</span></h1>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="fixture.html">Fixture</a></li>
        <li><a href="tops.html">Goleadores</a></li>
        <li><a href="elimination-bracket.html">Eliminatorias</a></li>
        <li><a href="login.html" id="nav-login">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div id="detail-render-target">
      <div style="text-align: center; padding: 3rem;">
        <p>Cargando detalle del partido...</p>
      </div>
    </div>
  </main>

  <script type="module" src="./js/match-detail.js"></script>
</body>
</html>
